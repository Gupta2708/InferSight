services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-infersight}
      POSTGRES_USER: ${POSTGRES_USER:-infersight}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-infersight}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-infersight} -d ${POSTGRES_DB:-infersight}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./apps/api
    environment:
      APP_ENV: ${APP_ENV:-development}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      BACKEND_URL: ${BACKEND_URL:-http://localhost:8000}
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://infersight:infersight@postgres:5432/infersight}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      LLM_MOCK_MODE: ${LLM_MOCK_MODE:-true}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      DEFAULT_PROVIDER: ${DEFAULT_PROVIDER:-mock}
      DEFAULT_MODEL: ${DEFAULT_MODEL:-mock-fast}
      DEFAULT_CONTEXT_WINDOW: ${DEFAULT_CONTEXT_WINDOW:-8}
      RATE_LIMIT_PER_MINUTE: ${RATE_LIMIT_PER_MINUTE:-20}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"

  worker:
    build:
      context: ./apps/api
    environment:
      APP_ENV: ${APP_ENV:-development}
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://infersight:infersight@postgres:5432/infersight}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      LLM_MOCK_MODE: ${LLM_MOCK_MODE:-true}
      DEFAULT_CONTEXT_WINDOW: ${DEFAULT_CONTEXT_WINDOW:-8}
      RATE_LIMIT_PER_MINUTE: ${RATE_LIMIT_PER_MINUTE:-20}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: python -m app.workers.ingestion_worker

  web:
    build:
      context: ./apps/web
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  postgres_data:
  redis_data:
